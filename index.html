<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Asset Tracker — Moil Primary School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <svg class="school-icon" width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#22C55E"/>
        <path d="M18 8L28 14V22L18 28L8 22V14L18 8Z" fill="white" opacity="0.9"/>
        <path d="M18 13L23 16V20L18 23L13 20V16L18 13Z" fill="#22C55E"/>
      </svg>
      <div>
        <div class="school-name">Moil Primary</div>
        <div class="school-sub">IT Asset Tracker</div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </button>

      <div class="nav-label">Assets</div>
      <button class="nav-item" data-view="devices">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <span>Devices</span><span class="nav-badge" id="badge-devices">0</span>
      </button>
      <button class="nav-item" data-view="accessories">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Accessories</span><span class="nav-badge" id="badge-accessories">0</span>
      </button>

      <div class="nav-label">Software</div>
      <button class="nav-item" data-view="licences">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Licences</span><span class="nav-badge" id="badge-licences">0</span>
      </button>

      <div class="nav-label">Finance</div>
      <button class="nav-item" data-view="budget">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
        <span>Budget & Planning</span>
      </button>

      <div class="nav-label">Operations</div>
      <button class="nav-item" data-view="maintenance">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span>Maintenance</span>
      </button>
      <button class="nav-item" data-view="checkout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Check In/Out</span>
      </button>
      <button class="nav-item" data-view="audit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        <span>Term Audit</span>
      </button>

      <div class="nav-label">Contacts</div>
      <button class="nav-item" data-view="vendors">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Vendors</span>
      </button>

      <div class="nav-label">Data</div>
      <button class="nav-item" data-view="export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Backup & Export</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="storage-row"><span>Storage</span><span id="storage-val">0 KB</span></div>
      <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
    </div>
  </aside>

  <!-- Main -->
  <div id="main">
    <header id="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="menu-btn" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New
        </button>
      </div>
    </header>

    <div id="views">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-devices" class="view"></div>
      <div id="view-accessories" class="view"></div>
      <div id="view-licences" class="view"></div>
      <div id="view-budget" class="view"></div>
      <div id="view-maintenance" class="view"></div>
      <div id="view-checkout" class="view"></div>
      <div id="view-audit" class="view"></div>
      <div id="view-vendors" class="view"></div>
      <div id="view-export" class="view"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <div id="modal-head">
      <h2 id="modal-title"></h2>
      <button class="icon-btn" id="modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-foot">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-overlay" class="hidden">
  <div id="confirm-box">
    <svg class="confirm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" id="confirm-no">Cancel</button>
      <button class="btn btn-danger" id="confirm-yes">Delete</button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/helpers.js"></script>
<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/devices.js"></script>
<script src="js/accessories.js"></script>
<script src="js/licences.js"></script>
<script src="js/maintenance.js"></script>
<script src="js/checkout.js"></script>
<script src="js/budget.js"></script>
<script src="js/audit.js"></script>
<script src="js/vendors.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
