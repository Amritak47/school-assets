<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Moil Primary School Asset Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #1B5E20 0%, #4CAF50 50%, #81C784 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="80" r="3" fill="rgba(255,255,255,0.05)"/><circle cx="50" cy="50" r="1.5" fill="rgba(255,255,255,0.08)"/></svg>') repeat;
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            margin-bottom: 20px;
        }
        .login-logo img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            border-radius: 20px;
            background: rgba(255,255,255,0.8);
            padding: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .login-logo svg {
            width: 80px;
            height: 80px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1B5E20;
            margin-bottom: 10px;
        }
        .login-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
            outline: none;
        }
        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        .login-footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        .flash-messages {
            margin-bottom: 20px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            border-left: 4px solid #c62828;
        }
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Moil Primary School logo" onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='block'">
            <div id="fallback-logo" style="display:none;">
                <svg width="96" height="96" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="18" fill="rgba(27,94,32,0.1)"/>
                    <circle cx="18" cy="10" r="2.5" fill="#1B5E20"/>
                    <path d="M18 13 L15 22 L21 22 Z" fill="#1B5E20"/>
                    <path d="M13 18 L18 15 M23 18 L18 15" stroke="#1B5E20" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="18" cy="18" r="16" stroke="#6CB33F" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
        </div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Moil Primary School Asset Tracker</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <p class="error">{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
        <form method="post" id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <div id="username-error" class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div id="password-error" class="error-message"></div>
            </div>
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>
        <div class="login-footer">
            <!-- Default credentials removed for security -->
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            let valid = true;

            document.getElementById('username-error').textContent = '';
            document.getElementById('password-error').textContent = '';

            if (!username) {
                document.getElementById('username-error').textContent = 'Username is required';
                valid = false;
            }
            if (!password) {
                document.getElementById('password-error').textContent = 'Password is required';
                valid = false;
            }

            if (!valid) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
